<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>伊丹発 フライト検索</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ITM検索">
<meta name="theme-color" content="#1a3a6b">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 15px; }

  /* Header */
  .header { background: #1a3a6b; color: white; padding: 14px 16px 10px; }
  .header h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.5px; }
  .header p { font-size: 12px; opacity: 0.75; margin-top: 2px; }

  /* Region tabs */
  .region-tabs { display: flex; background: #1a3a6b; padding: 0 16px; border-bottom: 2px solid #0d2450; }
  .region-tab { flex: 1; text-align: center; padding: 9px 4px; font-size: 13px; color: rgba(255,255,255,0.6); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; font-weight: 500; }
  .region-tab.active { color: white; border-bottom-color: #4da6ff; }

  /* Form */
  .form-section { background: white; padding: 14px 16px; border-bottom: 1px solid #e0e0e0; }
  .form-row { margin-bottom: 12px; }
  .form-row:last-child { margin-bottom: 0; }
  .form-label { font-size: 11px; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .form-label span { color: #d94f3d; margin-left: 2px; }

  select, input[type="date"], input[type="time"] {
    width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px;
    font-size: 15px; font-family: inherit; background: white; color: #1a1a1a;
    appearance: none; -webkit-appearance: none;
  }
  select:focus, input:focus { outline: none; border-color: #1a3a6b; }

  .time-condition { display: flex; gap: 8px; }
  .time-condition select { flex: 1.2; }
  .time-condition input { flex: 1; }

  /* Search button */
  .search-btn {
    width: 100%; padding: 13px; background: #1a3a6b; color: white; border: none;
    border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer;
    margin-top: 14px; letter-spacing: 0.5px; transition: background 0.2s;
  }
  .search-btn:active { background: #0d2450; }

  /* Results */
  .results { padding: 12px 16px; }
  .results-header { font-size: 12px; color: #666; margin-bottom: 10px; padding: 8px 12px; background: #eef2f8; border-radius: 6px; }
  .results-header strong { color: #1a3a6b; }

  /* Flight card */
  .flight-card { background: white; border-radius: 12px; margin-bottom: 10px; overflow: hidden; border: 1.5px solid #e8e8e8; }
  .flight-card.best { border-color: #1a3a6b; }

  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px 8px; border-bottom: 1px solid #f0f0f0; }
  .airline-badge { display: flex; align-items: center; gap: 6px; }
  .airline-logo { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: white; }
  .jal-logo { background: #d70f24; }
  .ana-logo { background: #0052a5; }
  .airline-name { font-size: 13px; font-weight: 600; color: #333; }
  .flight-num { font-size: 11px; color: #888; }
  .best-badge { background: #1a3a6b; color: white; font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }

  .card-timeline { padding: 12px 14px 10px; }
  .timeline-row { display: flex; align-items: center; gap: 0; }
  .tl-airport { text-align: center; min-width: 52px; }
  .tl-code { font-size: 13px; font-weight: 700; color: #1a1a1a; }
  .tl-name { font-size: 10px; color: #888; margin-top: 1px; }
  .tl-time { font-size: 22px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.5px; }
  .tl-line { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0 6px; }
  .tl-duration { font-size: 10px; color: #888; margin-bottom: 3px; }
  .tl-arrow { display: flex; align-items: center; width: 100%; }
  .tl-dot { width: 6px; height: 6px; border-radius: 50%; background: #1a3a6b; flex-shrink: 0; }
  .tl-dash { flex: 1; height: 1.5px; background: #bbb; }
  .tl-plane { font-size: 14px; color: #1a3a6b; flex-shrink: 0; margin: 0 2px; }

  .via-badge { background: #fff3e0; color: #e65100; font-size: 10px; padding: 2px 7px; border-radius: 4px; margin-top: 4px; font-weight: 600; }

  .card-footer { padding: 8px 14px 10px; border-top: 1px solid #f0f0f0; }
  .biz-point { display: flex; align-items: flex-start; gap: 6px; font-size: 12px; color: #555; line-height: 1.5; }
  .biz-icon { color: #1a3a6b; font-size: 13px; flex-shrink: 0; margin-top: 1px; }

  /* Recommendation box */
  .recommend-box { background: #eef2f8; border-left: 4px solid #1a3a6b; border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; }
  .recommend-title { font-size: 12px; font-weight: 700; color: #1a3a6b; margin-bottom: 5px; }
  .recommend-text { font-size: 13px; color: #333; line-height: 1.6; }

  /* No result */
  .no-result { text-align: center; padding: 40px 20px; color: #888; font-size: 14px; }
  .no-result .icon { font-size: 36px; margin-bottom: 10px; }

  /* Initial state */
  .initial-msg { text-align: center; padding: 30px 20px; color: #888; font-size: 13px; line-height: 1.7; }
  .initial-msg .icon { font-size: 40px; margin-bottom: 12px; }

  .loading { text-align: center; padding: 30px; color: #1a3a6b; font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>✈ 伊丹発 フライト検索</h1>
  <p>JAL / ANA 比較シミュレーター</p>
</div>

<div class="region-tabs">
  <div class="region-tab active" onclick="switchRegion('tohoku')">東北</div>
  <div class="region-tab" onclick="switchRegion('shikoku')">四国</div>
  <div class="region-tab" onclick="switchRegion('niigata')">新潟</div>
</div>

<div class="form-section">
  <div class="form-row">
    <div class="form-label">搭乗日 <span>*</span></div>
    <input type="date" id="flightDate">
  </div>
  <div class="form-row">
    <div class="form-label">目的地 <span>*</span></div>
    <select id="destSelect"></select>
  </div>
  <div class="form-row">
    <div class="form-label">希望条件 <span>*</span></div>
    <div class="time-condition">
      <select id="condType">
        <option value="arrive_by">○時までに到着</option>
        <option value="depart_after">○時以降に出発</option>
      </select>
      <select id="condTime"></select>
    </div>
  </div>
  <button class="search-btn" onclick="searchFlights()">🔍 フライトを検索</button>
</div>

<div id="results">
  <div class="initial-msg">
    <div class="icon">🛫</div>
    搭乗日・目的地・希望条件を選んで<br>「フライトを検索」を押してください
  </div>
</div>

  ],

    { airline:'ANA', num:'NH1653',  dep:'12:35', arr:'14:05', via:null, jal:false, biz:'昼便。午後打ち合わせ向け。' },
    { airline:'ANA', num:'NH1655',  dep:'19:15', arr:'20:45', via:null, jal:false, biz:'夜便。翌朝商談の前泊に最適。' },
  ],
};

let currentRegion = 'tohoku';

function switchRegion(region) {
  currentRegion = region;
  const regions = ['tohoku','shikoku','niigata'];
  document.querySelectorAll('.region-tab').forEach((t,i) => {
    t.classList.toggle('active', regions[i] === region);
  });
  updateDestOptions();
  document.getElementById('results').innerHTML = '<div class="initial-msg"><div class="icon">🛫</div>目的地を選んで検索してください</div>';
}

function updateDestOptions() {
  const sel = document.getElementById('destSelect');
  sel.innerHTML = DESTINATIONS[currentRegion].map(d =>
    `<option value="${d.code}">${d.label}</option>`
  ).join('');
}

function toMins(t) {
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}

function formatDate(d) {
  if(!d) return '';
  const dt = new Date(d);
  return `${dt.getMonth()+1}月${dt.getDate()}日`;
}

function getDayOfWeek(d) {
  if(!d) return '';
  const days = ['日','月','火','水','木','金','土'];
  return days[new Date(d).getDay()];
}

function searchFlights() {
  const date = document.getElementById('flightDate').value;
  const dest = document.getElementById('destSelect').value;
  const condType = document.getElementById('condType').value;
  const condTime = document.getElementById('condTime').value;

  if(!date || !dest || !condTime) {
    alert('搭乗日・目的地・希望時刻をすべて入力してください。');
    return;
  }

  const destInfo = DESTINATIONS[currentRegion].find(d => d.code === dest);
  const allFlights = SCHEDULES[dest] || [];
  const condMins = toMins(condTime);

  let filtered;
  if(condType === 'arrive_by') {
    filtered = allFlights.filter(f => toMins(f.arr) <= condMins);
    filtered.sort((a,b) => toMins(b.arr) - toMins(a.arr));
  } else {
    filtered = allFlights.filter(f => toMins(f.dep) >= condMins);
    filtered.sort((a,b) => toMins(a.dep) - toMins(b.dep));
  }

  const condLabel = condType === 'arrive_by'
    ? `${condTime}までに到着`
    : `${condTime}以降に出発`;

  const resultsDiv = document.getElementById('results');

  if(filtered.length === 0) {
    resultsDiv.innerHTML = `
      <div class="results-header">
        <strong>${formatDate(date)}（${getDayOfWeek(date)}）</strong> 伊丹 → ${destInfo.name}（${condLabel}）
      </div>
      <div class="no-result">
        <div class="icon">😔</div>
        条件に合う便が見つかりませんでした。<br>条件を変更して再度お試しください。
      </div>`;
    return;
  }

  const best = filtered[0];
  const candidates = filtered.slice(0, 4);

  const condLabel2 = condType === 'arrive_by' ? '到着' : '出発';
  const bestAirline = best.airline;
  const bestReason = condType === 'arrive_by'
    ? `${condTime}の到着希望に対し、最も遅れずに${best.arr}に到着できるため`
    : `${condTime}以降で最も早く${best.dep}に出発できるため`;

  let html = `
    <div class="results" id="results-inner">
      <div class="results-header">
        <strong>${formatDate(date)}（${getDayOfWeek(date)}）伊丹 → ${destInfo.name}</strong>（${condLabel}）<br>
        ${filtered.length}便が該当 · 上位${candidates.length}便を表示
      </div>

      <div class="recommend-box">
        <div class="recommend-title">🏆 判定・おすすめ</div>
        <div class="recommend-text">
          今回の出張には、<strong>${bestAirline} ${best.num}</strong> が最もおすすめです。<br>
          ${bestReason}${best.via ? '（羽田乗継）' : '（直行）'}です。
        </div>
      </div>`;

  candidates.forEach((f, i) => {
    const isBest = i === 0;
    const depM = toMins(f.arr) - toMins(f.dep);
    const isJAL = f.jal;
    html += `
      <div class="flight-card${isBest ? ' best' : ''}">
        <div class="card-header">
          <div class="airline-badge">
            <div class="airline-logo ${isJAL ? 'jal-logo' : 'ana-logo'}">${isJAL ? 'J' : 'A'}</div>
            <div>
              <div class="airline-name">${f.airline}</div>
              <div class="flight-num">${f.num}</div>
            </div>
          </div>
          ${isBest ? '<span class="best-badge">✓ 最適</span>' : `<span style="font-size:12px;color:#999;">候補${i+1}</span>`}
        </div>
        <div class="card-timeline">
          <div class="timeline-row">
            <div class="tl-airport">
              <div class="tl-time">${f.dep}</div>
              <div class="tl-code">ITM</div>
              <div class="tl-name">伊丹</div>
            </div>
            <div class="tl-line">
              <div class="tl-duration">約${depM}分${f.via ? ' (乗継)' : ' 直行'}</div>
              <div class="tl-arrow">
                <div class="tl-dot"></div>
                <div class="tl-dash"></div>
                <div class="tl-plane">✈</div>
                <div class="tl-dash"></div>
                <div class="tl-dot"></div>
              </div>
              ${f.via ? `<div class="via-badge">経由: ${f.via}</div>` : ''}
            </div>
            <div class="tl-airport">
              <div class="tl-time">${f.arr}</div>
              <div class="tl-code">${dest}</div>
              <div class="tl-name">${destInfo.name}</div>
            </div>
          </div>
        </div>
        <div class="card-footer">
          <div class="biz-point">
            <span class="biz-icon">💼</span>
            <span>${f.biz}</span>
          </div>
        </div>
      </div>`;
  });

  html += `</div>`;
  resultsDiv.innerHTML = html;
  resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// 時刻セレクト（15分刻み）初期化
function buildTimeSelect(defaultTime) {
  const sel = document.getElementById('condTime');
  sel.innerHTML = '';
  for(let h = 0; h < 24; h++) {
    for(let m of [0, 15, 30, 45]) {
      const hh = String(h).padStart(2,'0');
      const mm2 = String(m).padStart(2,'0');
      const val = `${hh}:${mm2}`;
      const opt = document.createElement('option');
      opt.value = val;
      opt.textContent = val;
      if(val === defaultTime) opt.selected = true;
      sel.appendChild(opt);
    }
  }
}

// 初期化
updateDestOptions();
buildTimeSelect('10:00');
const today = new Date();
const yyyy = today.getFullYear();
const mm = String(today.getMonth()+1).padStart(2,'0');
const dd = String(today.getDate()).padStart(2,'0');
document.getElementById('flightDate').value = `${yyyy}-${mm}-${dd}`;
// Service Worker 登録
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
